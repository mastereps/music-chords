name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: music_chords_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d music_chords_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CLIENT_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/music_chords_test
      JWT_SECRET: ci-test-secret-value
      NODE_ENV: test
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_ADMIN_PASSWORD: Admin123!
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/music_chords_test
      VITE_API_BASE_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run migrate
      - run: npm test
      - run: npm run build
      - run: npm run seed -w backend
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  # Only runs after `verify` passes, and only for main — a red build or a PR never reaches the VPS.
  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Attach required reviewers to this environment in repo settings if you want a manual gate.
    environment: production
    steps:
      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinning the host key is what stops a hijacked DNS or IP from collecting this key.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$VPS_USER@$VPS_HOST" \
            'cd /var/www/music_chords && ./deploy.sh'
