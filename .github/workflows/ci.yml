name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: music_chords_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d music_chords_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CLIENT_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/music_chords_test
      JWT_SECRET: ci-test-secret-value
      NODE_ENV: test
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_ADMIN_PASSWORD: Admin123!
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/music_chords_test
      VITE_API_BASE_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run migrate
      - run: npm test
      - run: npm run build
      - run: npm run seed -w backend
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
